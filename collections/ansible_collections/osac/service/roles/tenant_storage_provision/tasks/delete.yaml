---
# Remove all StorageClasses labeled for a tenant.

- name: Find tenant StorageClasses
  kubernetes.core.k8s_info:
    api_version: storage.k8s.io/v1
    kind: StorageClass
    label_selectors:
      - "osac.openshift.io/tenant={{ tenant_storage_provision_tenant_name }}"
    kubeconfig: "{{ kubeconfig | default(omit) }}"
  register: _tsp_tenant_scs

- name: Clean up storage backend for tenant
  ansible.builtin.include_tasks: cleanup_backend.yaml

- name: Delete tenant StorageClasses
  kubernetes.core.k8s:
    state: absent
    api_version: storage.k8s.io/v1
    kind: StorageClass
    name: "{{ item.metadata.name }}"
    kubeconfig: "{{ kubeconfig | default(omit) }}"
  loop: "{{ _tsp_tenant_scs.resources }}"
  loop_control:
    label: "{{ item.metadata.name }}"
  when: _tsp_tenant_scs.resources | length > 0

- name: Report result
  ansible.builtin.debug:
    msg: >-
      Removed {{ _tsp_tenant_scs.resources | length }} StorageClass(es)
      for tenant '{{ tenant_storage_provision_tenant_name }}'.
