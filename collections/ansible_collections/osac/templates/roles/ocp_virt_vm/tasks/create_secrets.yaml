---
- name: Create sysprep ConfigMap with unattend.xml for hostname (Windows)
  when:
    - guest_os_family == 'windows'
    - vm_enable_sysprep | bool
  block:
    - name: Create sysprep ConfigMap with unattend.xml for hostname
      kubernetes.core.k8s:
        kubeconfig: "{{ remote_cluster_kubeconfig | default(omit) }}"
        state: present
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: "{{ compute_instance_name }}-sysprep"
            namespace: "{{ compute_instance_target_namespace }}"
            labels: "{{ default_vm_labels }}"
          data:
            Unattend.xml: |
              <?xml version="1.0" encoding="utf-8"?>
              <unattend xmlns="urn:schemas-microsoft-com:unattend">
                <settings pass="specialize">
                  <component name="Microsoft-Windows-Deployment"
                             processorArchitecture="amd64"
                             publicKeyToken="31bf3856ad364e35"
                             language="neutral"
                             versionScope="nonSxS">
                    <ExtendOSPartition>
                      <Extend>true</Extend>
                    </ExtendOSPartition>
                  </component>
                </settings>
                <settings pass="oobeSystem">
                  <component xmlns:wcm="http://schemas.microsoft.com/WMIConfig/2002/State"
                             xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                             name="Microsoft-Windows-International-Core"
                             processorArchitecture="amd64"
                             publicKeyToken="31bf3856ad364e35"
                             language="neutral"
                             versionScope="nonSxS">
                    <InputLocale>{{ vm_sysprep_input_locale }}</InputLocale>
                    <SystemLocale>{{ vm_sysprep_system_locale }}</SystemLocale>
                    <UILanguage>{{ vm_sysprep_ui_language }}</UILanguage>
                    <UserLocale>{{ vm_sysprep_user_locale }}</UserLocale>
                  </component>
                  <component xmlns:wcm="http://schemas.microsoft.com/WMIConfig/2002/State"
                             xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                             name="Microsoft-Windows-Shell-Setup"
                             processorArchitecture="amd64"
                             publicKeyToken="31bf3856ad364e35"
                             language="neutral"
                             versionScope="nonSxS">
                    <OOBE>
                      <HideEULAPage>true</HideEULAPage>
                      <HideOEMRegistrationScreen>true</HideOEMRegistrationScreen>
                      <HideOnlineAccountScreens>true</HideOnlineAccountScreens>
                      <HideWirelessSetupInOOBE>true</HideWirelessSetupInOOBE>
                      <NetworkLocation>Work</NetworkLocation>
                      <SkipUserOOBE>true</SkipUserOOBE>
                      <SkipMachineOOBE>true</SkipMachineOOBE>
                      <ProtectYourPC>3</ProtectYourPC>
                    </OOBE>
                    <AutoLogon>
                      <Password>
                        <Value>{{ vm_sysprep_admin_password }}</Value>
                        <PlainText>true</PlainText>
                      </Password>
                      <Enabled>{{ vm_sysprep_autologon_enabled | lower }}</Enabled>
                      <Username>Administrator</Username>
                    </AutoLogon>
                    <UserAccounts>
                      <AdministratorPassword>
                        <Value>{{ vm_sysprep_admin_password }}</Value>
                        <PlainText>true</PlainText>
                      </AdministratorPassword>
                    </UserAccounts>
                    <RegisteredOrganization/>
                    <RegisteredOwner/>
                    <TimeZone>{{ vm_sysprep_timezone }}</TimeZone>
                  </component>
                </settings>
              </unattend>

    - name: Add sysprep disk to template spec
      ansible.builtin.set_fact:
        vm_template_spec: "{{ vm_template_spec | combine(sysprep_patch, recursive=True, list_merge='append') }}"
      vars:
        sysprep_patch:
          domain:
            devices:
              disks:
                - name: sysprep-disk
                  cdrom:
                    bus: sata
          volumes:
            - name: sysprep-disk
              sysprep:
                configMap:
                  name: "{{ compute_instance_name }}-sysprep"

- name: Copy user-data secret to VM namespace and add cloud-init disk to template spec
  when: vm_user_data_secret_ref | length > 0
  block:
    - name: Read user-data secret from ComputeInstance namespace
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Secret
        name: "{{ vm_user_data_secret_ref }}"
        namespace: "{{ compute_instance.metadata.namespace }}"
      register: user_data_secret

    - name: Fail if user-data secret not found
      ansible.builtin.assert:
        that:
          - user_data_secret.resources | length > 0
        fail_msg: >-
          Secret '{{ vm_user_data_secret_ref }}' not found in namespace
          '{{ compute_instance.metadata.namespace }}'

    - name: Create user-data secret in VM namespace
      kubernetes.core.k8s:
        kubeconfig: "{{ remote_cluster_kubeconfig | default(omit) }}"
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: "{{ compute_instance_name }}-user-data"
            namespace: "{{ compute_instance_target_namespace }}"
            labels: "{{ default_vm_labels }}"
          type: Opaque
          data: "{{ user_data_secret.resources[0].data }}"

    - name: Add cloud-init disk to template spec
      ansible.builtin.set_fact:
        vm_template_spec: "{{ vm_template_spec | combine(cloud_init_patch, recursive=True, list_merge='append') }}"
      vars:
        cloud_init_patch:
          domain:
            devices:
              disks:
                - name: cloud-init-disk
                  disk:
                    bus: virtio
                  serial: cloud-init
          volumes:
            - name: cloud-init-disk
              cloudInitNoCloud:
                secretRef:
                  name: "{{ compute_instance_name }}-user-data"

- name: Add minimal cloud-init disk for SSH key propagation (Linux)
  ansible.builtin.set_fact:
    vm_template_spec: "{{ vm_template_spec | combine(cloud_init_patch, recursive=True, list_merge='append') }}"
  vars:
    cloud_init_patch:
      domain:
        devices:
          disks:
            - name: cloud-init-disk
              disk:
                bus: virtio
              serial: cloud-init
      volumes:
        - name: cloud-init-disk
          cloudInitNoCloud:
            userData: "#cloud-config"
  when:
    - guest_os_family == 'linux'
    - vm_ssh_key | length > 0
    - vm_user_data_secret_ref | length == 0

- name: Create ssh public key secret and add accessCredentials to template spec (Linux)
  when:
    - guest_os_family == 'linux'
    - vm_ssh_key | length > 0
  block:
    - name: Create Secret resource containing ssh public key
      kubernetes.core.k8s:
        kubeconfig: "{{ remote_cluster_kubeconfig | default(omit) }}"
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: "{{ compute_instance_name }}-ssh-public-key"
            namespace: "{{ compute_instance_target_namespace }}"
            labels: "{{ default_vm_labels }}"
          data:
            ssh-public-key: "{{ vm_ssh_key | b64encode }}"
          type: Opaque

    - name: Add accessCredentials to template spec
      ansible.builtin.set_fact:
        vm_template_spec: "{{ vm_template_spec | combine(ssh_public_key_patch, recursive=True, list_merge='append') }}"
      vars:
        ssh_public_key_patch:
          accessCredentials:
            - sshPublicKey:
                source:
                  secret:
                    secretName: "{{ compute_instance_name }}-ssh-public-key"
                propagationMethod:
                  noCloud: {}
